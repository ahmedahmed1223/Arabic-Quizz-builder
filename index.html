<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة المسابقات التفاعلية</title>

  <!-- ═══ Content Security Policy ═══
       Allows inline scripts/styles for single-file offline app,
       restricts external connections to known CDNs only, blocks unknown origins.
       font-src includes data: for KaTeX embedded fonts (woff2 data-URIs) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src *; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob: *; media-src 'self' data: blob: *;">

  <!-- ═══ Google Fonts (non-blocking to prevent startup freeze when offline) ═══ -->
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet"></noscript>

  <!-- ═══ Vendor CSS (Quill, Cropper, KaTeX) ═══
       Loaded as separate files in dev, inlined into a single <style> block at build time. -->
  <link rel="stylesheet" href="/src/styles/vendor-quill.css">
  <link rel="stylesheet" href="/src/styles/vendor-cropper.css">
  <link rel="stylesheet" href="/src/styles/vendor-katex.css">

  <!-- ═══ Application CSS ═══ -->
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/src/styles/animations.css">
  <!-- UI/UX Enhancement Layer — loaded after main.css to refine and polish -->
  <link rel="stylesheet" href="/src/styles/enhancements.css">
  <link rel="stylesheet" href="/src/styles/enhancements-2.css">
  <link rel="stylesheet" href="/src/styles/enhancements-3.css">
  <link rel="stylesheet" href="/src/styles/enhancements-solo.css">

  <link rel="stylesheet" href="/src/styles/enhancements-mobile.css">
  <link rel="stylesheet" href="/src/styles/enhancements-v2.css">
  <link rel="stylesheet" href="/src/styles/enhancements-mobile-v2.css">
  <!-- V14: Modern loading screen styles -->
  <link rel="stylesheet" href="/src/styles/loading-v14.css">
</head>
<body>
  <!-- The full body markup from the original app (ARIA regions, loading spinner,
       admin panel, presentation screens, modals, etc.) is injected here at build
       time from src/templates/body.html via the inline-classic-assets plugin. -->
  <!-- __BODY_MARKER__ -->

  <!-- ════════════════════════════════════════════════════════
       Scripts — loaded in strict dependency order
       (classic scripts share global lexical scope across tags,
        matching the original single-file app's IIFE pattern)
       At build time, each <script src> is inlined into a single
       inline <script> block by the inline-classic-assets plugin.
       ════════════════════════════════════════════════════════ -->

  <script src="/src/vendor/katex.js"></script>

  <script src="/src/vendor/xlsx.js"></script>
  <script src="/src/vendor/sanitizer.js"></script>

  <!-- ── Application core (must load in order) ── -->

  <script src="/src/app/01-foundation.js"></script>
  <script src="/src/app/02-storage.js"></script>

</body>
</html>
