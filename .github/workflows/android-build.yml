          # Verify signed APK
          [span_26](start_span)${ANDROID_HOME}/build-tools/34.0.0/apksigner verify ./releases/arabic-quiz-signed-release.apk[span_26](end_span)
          
          [span_27](start_span)echo "APK successfully compiled, signed and saved to ./releases/"[span_27](end_span)

      - name: Upload Compile Artifact for Build Retention
        [span_28](start_span)uses: actions/upload-artifact@v4[span_28](end_span)
        with:
