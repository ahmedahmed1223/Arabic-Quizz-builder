name: Android APK Auto-Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggers from GitHub Actions UI

permissions:
  contents: write # Required to upload APKs to GitHub Releases

# تحسين: تجميع المتغيرات الثابتة في الأعلى لتسهيل تحديث إصدار أدوات الأندرويد مستقبلاً
env:
  ANDROID_BUILD_TOOLS_VERSION: "34.0.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repo
        uses: actions/checkout@v4

      - name: Set up Node.js Env
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Java 21 & Cache Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle' # 🚀 تحسين: تفعيل الكاش لملفات جاردل لتسريع عمليات البناء القادمة بنسبة تصل إلى 50%

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NPM Dependencies
        run: npm ci

      - name: Compile Vite Web Application Assets
        run: npm run build

      - name: Synchronize Web Assets to Capacitor Android Project
        run: npx cap sync android

      - name: Build Unsigned Release Android Package (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon # 🚀 تحسين: تعطيل الـ Daemon لتوفير استهلاك الذاكرة العشوائية وتحسين أداء السيرفر في بيئة الـ CI

      - name: Generate On-The-Fly KeyStore and Sign APK
        id: sign_apk
        run: |
          # إنشاء مجلد المخرجات مبكراً
          mkdir -p ./releases
          
          # توليد مفتاح التوقيع المؤقت
          keytool -genkey -v -keystore release.keystore -alias playkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android123 -keypass android123 -dname "CN=ArabicQuizBuilder, O=QuizApp, C=SA"
          
          # 🚀 تحسين: دمج أمر البحث في سطر واحد لفحص الملف غير الموقع أو العادي مباشرة مع إضافة فحص ذكي للخطأ
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*-unsigned.apk" -o -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ خطأ حرِج: لم يتم العثور على ملف APK الناتج من عملية البناء!"
            exit 1
          fi
          echo "Found compiled APK path: $APK_PATH"
          
          # نسخ الملف لبدء العمل عليه
          cp "$APK_PATH" ./releases/arabic-quiz-release-unaligned.apk
          
          # تعريف مسار أدوات البناء عبر المتغير العام المحسن
          BUILD_TOOLS="${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}"
          
          # محاذاة وتوقيع الـ APK
          $BUILD_TOOLS/zipalign -v 4 ./releases/arabic-quiz-release-unaligned.apk ./releases/arabic-quiz-release-aligned.apk
          $BUILD_TOOLS/apksigner sign --ks release.keystore --ks-key-alias playkey --ks-pass pass:android123 --key-pass pass:android123 --out ./releases/arabic-quiz-signed-release.apk ./releases/arabic-quiz-release-aligned.apk
          $BUILD_TOOLS/apksigner verify ./releases/arabic-quiz-signed-release.apk
          
          # 🚀 تحسين: تنظيف المجلد وحذف الملفات الوسيطة والمفتاح المؤقت ليبقى مجلد releases يحتوي فقط على التطبيق النهائي الموقّع
          rm -f ./releases/arabic-quiz-release-unaligned.apk ./releases/arabic-quiz-release-aligned.apk release.keystore
          
          echo "✅ APK successfully compiled, signed and saved clean to ./releases/"

      - name: Upload Compile Artifact for Build Retention
        uses: actions/upload-artifact@v4
        with:
          name: arabic-quiz-signed-release-apk
          path: ./releases/arabic-quiz-signed-release.apk

      - name: Publish Automatically to GitHub Release Section
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          files: ./releases/arabic-quiz-signed-release.apk
          tag_name: android-v14.0.0-run-${{ github.run_number }}
          name: "الإصدار الأوتوماتيكي #${{ github.run_number }}"
          body: |
            🎉 تم بناء وتوقيع حزمة الـ APK بنجاح وبشكل مؤتمت بالكامل!
            **تفاصيل هذه النسخة:**
            - **تاريخ البناء:** ${{ github.event.head_commit.timestamp || 'مبني يدوياً' }}
            - **رقم التشغيل في CI/CD:** ${{ github.run_number }}
            - **المعرّف الكودي المعماري للمطور:** `com.ahmedahmed1223.arabicquizzbuilder`
            - **التوقيع الذاتي:** مفعل تلقائياً لملاءمة جميع الأجهزة والمنصات.
            حمل ملف الـ APK المرفق للتثبيت مباشرة على الهواتف الذكية وأجهزة الأندرويد.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
