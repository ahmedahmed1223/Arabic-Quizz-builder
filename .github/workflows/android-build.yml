name: Android APK Auto-Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggers from GitHub Actions UI

permissions:
  contents: write # Required to commit and push changes back to repo

env:
  ANDROID_BUILD_TOOLS_VERSION: "34.0.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js Env
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Java 21 & Cache Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NPM Dependencies
        run: npm ci

      - name: Compile Vite Web Application Assets
        run: npm run build

      # أتمتة إنشاء وتخصيص ملف index.html في مجلد dist
      - name: Automate index.html Creation in dist Folder
        run: |
          mkdir -p dist
          cat << 'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Arabic Quiz Builder</title>
          </head>
          <body>
              <div id="app"></div>
          </body>
          </html>
          EOF
          echo "✅ تم إنشاء ملف dist/index.html"

      - name: Synchronize Web Assets to Capacitor Android Project
        run: npx cap sync android

      - name: Build Unsigned Release Android Package (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Generate On-The-Fly KeyStore and Sign APK
        id: sign_apk
        run: |
          mkdir -p ./releases
          
          keytool -genkey -v -keystore release.keystore -alias playkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android123 -keypass android123 -dname "CN=ArabicQuizBuilder, O=QuizApp, C=SA"
          
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*-unsigned.apk" -o -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ خطأ حرِج: لم يتم العثور على ملف APK الناتج من عملية البناء!"
            exit 1
          fi
          
          cp "$APK_PATH" ./releases/arabic-quiz-release-unaligned.apk
          
          BUILD_TOOLS="${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}"
          
          $BUILD_TOOLS/zipalign -v 4 ./releases/arabic-quiz-release-unaligned.apk ./releases/arabic-quiz-release-aligned.apk
          $BUILD_TOOLS/apksigner sign --ks release.keystore --ks-key-alias playkey --ks-pass pass:android123 --key-pass pass:android123 --out ./releases/arabic-quiz-signed-release.apk ./releases/arabic-quiz-release-aligned.apk
          $BUILD_TOOLS/apksigner verify ./releases/arabic-quiz-signed-release.apk
          
          # تنظيف الملفات المؤقتة وإبقاء الـ APK النهائي فقط داخل مجلد releases
          rm -f ./releases/arabic-quiz-release-unaligned.apk ./releases/arabic-quiz-release-aligned.apk release.keystore
          echo "✅ تم تجهيز وتوقيع الـ APK بنجاح في مجلد releases"

      # رفع وحفظ التغييرات مباشرة للمستودع (دون توليد Release)
      - name: Commit and Push generated files back to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # إضافة ملف index.html ومجلد releases بالإجبار
          git add dist/index.html releases/arabic-quiz-signed-release.apk -f
          
          # التحقق من وجود تغييرات حقيقية لتفادي توقف السيرفر عند التكرار
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "🤖 أتمتة: تحديث ملفات البناء ومجلد الـ releases محلياً"
            git push origin main
          fi
